name: Release

# Trigger on version tags (v1.2.3) or manually for testing
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Toolchains
      # -----------------------------------------------------------------------
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      # -----------------------------------------------------------------------
      # Node dependencies
      # -----------------------------------------------------------------------
      - name: Install root dependencies
        run: npm ci

      - name: Install scraper-node dependencies
        working-directory: scraper-node
        run: npm ci

      # -----------------------------------------------------------------------
      # Build Node SEA sidecar  →  src-tauri/binaries/scraper-node-*.exe
      # -----------------------------------------------------------------------
      - name: Build Node SEA sidecar
        working-directory: scraper-node
        run: node build.mjs

      # -----------------------------------------------------------------------
      # Download Playwright Chromium headless-shell  →  src-tauri/binaries/
      # -----------------------------------------------------------------------
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\ms-playwright
          key: playwright-chromium-${{ hashFiles('scraper-node/package-lock.json') }}

      - name: Download Chromium headless-shell
        working-directory: scraper-node
        run: node setup-chromium.mjs

      # -----------------------------------------------------------------------
      # Sync tauri.conf.json version with the git tag (tag builds only)
      # -----------------------------------------------------------------------
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag     = '${{ github.ref_name }}'
          $version = $tag -replace '^v', ''
          $cfg     = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $cfg.version = $version
          $cfg | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json -Encoding UTF8
          Write-Host "tauri.conf.json version → $version"

      # -----------------------------------------------------------------------
      # Tauri NSIS build
      # -----------------------------------------------------------------------
      - name: Build Tauri app (NSIS installer)
        run: npm run build:tauri

      # -----------------------------------------------------------------------
      # Always upload installer as a workflow artifact (useful for manual runs)
      # -----------------------------------------------------------------------
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-scraper-agent-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Create GitHub Release and attach the installer (tag builds only)
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
