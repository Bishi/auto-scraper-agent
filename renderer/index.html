<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto-Scraper Agent</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header ─────────────────────────────────── */
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 16px 20px 0;
        flex-shrink: 0;
      }

      .header h1 { font-size: 17px; font-weight: 600; }

      .version-badge {
        font-size: 11px;
        color: #475569;
        background: #1e293b;
        padding: 2px 7px;
        border-radius: 10px;
        flex-shrink: 0;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #475569;
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .status-dot.online  { background: #22c55e; }
      .status-dot.offline { background: #ef4444; }

      .status-text { font-size: 12px; color: #64748b; }
      .schedule-text { font-size: 12px; color: #475569; }

      /* ── Tabs ────────────────────────────────────── */
      .tabs {
        display: flex;
        padding: 12px 20px 0;
        border-bottom: 1px solid #1e293b;
        margin-top: 8px;
        flex-shrink: 0;
      }

      .tab {
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 500;
        color: #64748b;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        user-select: none;
        transition: color 0.15s;
      }
      .tab.active          { color: #e2e8f0; border-bottom-color: #6366f1; }
      .tab:hover:not(.active) { color: #94a3b8; }

      /* ── Content area ────────────────────────────── */
      .content {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .panel { display: none; flex: 1; flex-direction: column; min-height: 0; }
      .panel.active { display: flex; }

      /* Settings panel scrolls normally */
      #panel-settings.active { overflow-y: auto; padding: 20px; }

      /* Logs panel — log-box gets the scroll */
      #panel-logs.active { overflow: hidden; padding: 16px 20px; }

      /* ── Form ────────────────────────────────────── */
      .field { margin-bottom: 16px; }

      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #cbd5e1;
        margin-bottom: 5px;
      }

      input[type="url"],
      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #1e293b;
        color: #f1f5f9;
        font-size: 14px;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus { border-color: #6366f1; }

      .hint {
        margin-top: 4px;
        font-size: 12px;
        color: #64748b;
      }

      button.primary {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #6366f1;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      button.primary:hover    { background: #4f46e5; }
      button.primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

      .alert {
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        display: none;
      }
      .alert.error   { background: #450a0a; color: #fca5a5; }
      .alert.success { background: #052e16; color: #86efac; }

      /* ── Logs ────────────────────────────────────── */
      .logs-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        flex-shrink: 0;
      }

      .logs-toolbar span { font-size: 12px; color: #64748b; }

      button.ghost {
        padding: 4px 10px;
        border: 1px solid #334155;
        border-radius: 4px;
        background: transparent;
        color: #94a3b8;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      button.ghost:hover { background: #1e293b; color: #e2e8f0; }

      button.danger {
        width: 100%;
        padding: 8px;
        border: 1px solid #7f1d1d;
        border-radius: 6px;
        background: #1c0a0a;
        color: #fca5a5;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }
      button.danger:hover    { background: #450a0a; }
      button.danger:disabled { opacity: 0.4; cursor: not-allowed; }

      .section-divider {
        margin: 18px 0 12px;
        border: none;
        border-top: 1px solid #1e293b;
      }
      .section-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #475569;
        margin-bottom: 8px;
      }

      button.run {
        padding: 4px 12px;
        min-width: 96px;
        border: 1px solid #166534;
        border-radius: 4px;
        background: #052e16;
        color: #86efac;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }
      button.run:hover    { background: #14532d; }
      button.run:disabled { opacity: 0.5; cursor: not-allowed; }

      button.stop {
        padding: 4px 12px;
        border: 1px solid #7f1d1d;
        border-radius: 4px;
        background: #1c0a0a;
        color: #fca5a5;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s;
      }
      button.stop:hover    { background: #450a0a; }
      button.stop:disabled { opacity: 0.35; cursor: not-allowed; }

      button.pause {
        padding: 3px 10px;
        border: 1px solid #334155;
        border-radius: 4px;
        background: #0f172a;
        color: #94a3b8;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        flex-shrink: 0;
      }
      button.pause:hover { background: #1e293b; color: #e2e8f0; }
      button.pause.paused { border-color: #166534; background: #052e16; color: #86efac; }

      .log-box {
        flex: 1;
        background: #020617;
        border: 1px solid #1e293b;
        border-radius: 6px;
        padding: 10px 12px;
        overflow-y: auto;
        font-family: "Consolas", "Cascadia Code", "Fira Mono", monospace;
        font-size: 12px;
        line-height: 1.6;
        min-height: 0;
      }

      .log-entry       { display: flex; gap: 10px; }
      .log-ts          { color: #475569; flex-shrink: 0; }
      .log-entry.info  .log-msg { color: #cbd5e1; }
      .log-entry.error .log-msg { color: #f87171; }
      .log-msg         { word-break: break-all; white-space: pre-wrap; }

      .log-empty { color: #334155; font-style: italic; padding: 4px 0; }

      /* ── Update badge ────────────────────────────────── */
      .update-badge {
        display: none;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        font-weight: 500;
        color: #fbbf24;
        background: #1c1408;
        border: 1px solid #78350f;
        padding: 2px 8px;
        border-radius: 10px;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s;
      }
      .update-badge:hover { background: #292008; }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Auto-Scraper Agent</h1>
      <span class="version-badge" id="version-badge"></span>
      <div class="status-dot" id="dot"></div>
      <span class="status-text" id="status-text">checking…</span>
      <span class="schedule-text" id="schedule-text"></span>
      <button class="update-badge" id="update-badge" title="Click to install update">↑ <span id="update-version"></span></button>
      <button class="pause" id="pause-btn" style="margin-left:auto">⏸ Pause schedule</button>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="settings">Settings</div>
      <div class="tab" data-tab="logs">Logs</div>
    </div>

    <div class="content">

      <!-- Settings panel -->
      <div class="panel active" id="panel-settings">
        <div class="field">
          <label for="server-url">Server URL</label>
          <input id="server-url" type="url"
            placeholder="https://your-server.vercel.app"
            autocomplete="off" spellcheck="false" />
        </div>

        <div class="field">
          <label for="api-key">API Key</label>
          <input id="api-key" type="password"
            placeholder="as_live_…"
            autocomplete="off" spellcheck="false" />
          <p class="hint" id="key-hint" style="display:none">
            A key is already saved. Leave blank to keep it.
          </p>
        </div>

        <button class="primary" id="save-btn">Save</button>
        <div class="alert error"   id="error-msg"></div>
        <div class="alert success" id="success-msg">Saved! Agent will scrape on schedule.</div>

        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="run"  id="run-scrape-settings-btn" style="flex:1;padding:8px">▶ Run Scrape</button>
          <button class="stop" id="stop-scrape-settings-btn" style="flex:1;padding:8px" disabled>⏹ Stop Scrape</button>
        </div>

        <hr class="section-divider" />
        <div class="section-label">Troubleshooting</div>
        <button class="danger" id="clear-profile-btn">🗑 Clear Browser Profile</button>
        <div class="alert error"   id="clear-profile-error"></div>
        <div class="alert success" id="clear-profile-success">Browser profile cleared — will start fresh on next scrape.</div>
        <p class="hint" id="clear-profile-hint">Fixes Cloudflare blocks. Only available when no scrape is running.</p>
      </div>

      <!-- Logs panel -->
      <div class="panel" id="panel-logs">
        <div class="logs-toolbar">
          <span id="log-count">0 entries</span>
          <div style="display:flex;gap:6px">
            <button class="run"  id="run-scrape-btn">▶ Run Scrape</button>
            <button class="stop" id="stop-scrape-btn" disabled>⏹ Stop</button>
            <button class="ghost" id="clear-btn">Clear</button>
          </div>
        </div>
        <div class="log-box" id="log-box">
          <div class="log-empty">No logs yet.</div>
        </div>
      </div>

    </div>

    <script>
      const SIDECAR = "http://127.0.0.1:9001";
      const { invoke } = window.__TAURI__.core;

      // ── Version badge ──────────────────────────────────────────────────────
      window.__TAURI__.app.getVersion().then((v) => {
        document.getElementById("version-badge").textContent = "v" + v;
      }).catch(() => {});

      // ── Tabs ───────────────────────────────────────────────────────────────
      function switchTab(name) {
        document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
        const tabEl = document.querySelector(`.tab[data-tab="${name}"]`);
        if (tabEl) {
          tabEl.classList.add("active");
          document.getElementById("panel-" + name).classList.add("active");
        }
      }

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => switchTab(tab.dataset.tab));
      });

      // Honour ?tab= query param (e.g. when opened from tray "Run Now" → tab=logs)
      const initialTab = new URLSearchParams(window.location.search).get("tab");
      if (initialTab) switchTab(initialTab);

      // ── Fetch helper with timeout ──────────────────────────────────────────
      function fetchTimeout(url, ms = 2000, opts = {}) {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), ms);
        return fetch(url, { signal: controller.signal, ...opts }).finally(() => clearTimeout(id));
      }

      // ── Status dot ─────────────────────────────────────────────────────────
      const dot        = document.getElementById("dot");
      const statusText = document.getElementById("status-text");

      async function pollHealth() {
        try {
          const res = await fetchTimeout(`${SIDECAR}/health`);
          if (res.ok) {
            dot.className       = "status-dot online";
            statusText.textContent = "Online";
          } else {
            dot.className       = "status-dot offline";
            statusText.textContent = "error " + res.status;
          }
        } catch {
          dot.className       = "status-dot offline";
          statusText.textContent = "offline";
        }
      }

      pollHealth();
      setInterval(pollHealth, 5000);

      // ── Pre-fill settings from saved config ────────────────────────────────
      const serverInput = document.getElementById("server-url");
      const keyInput    = document.getElementById("api-key");
      const keyHint     = document.getElementById("key-hint");

      async function loadConfig() {
        try {
          const res = await fetchTimeout(`${SIDECAR}/config`);
          if (!res.ok) return;
          const data = await res.json();
          if (data.serverUrl)  serverInput.value = data.serverUrl;
          if (data.hasApiKey) {
            keyInput.placeholder   = "••••••••  (saved)";
            keyHint.style.display  = "block";
          }
        } catch { /* sidecar not up yet — silently ignore */ }
      }

      loadConfig();

      // ── Save ───────────────────────────────────────────────────────────────
      const saveBtn   = document.getElementById("save-btn");
      const errorEl   = document.getElementById("error-msg");
      const successEl = document.getElementById("success-msg");

      saveBtn.addEventListener("click", async () => {
        errorEl.style.display   = "none";
        successEl.style.display = "none";

        const serverUrl = serverInput.value.trim();
        const apiKey    = keyInput.value.trim();

        if (!serverUrl) {
          errorEl.textContent   = "Server URL is required.";
          errorEl.style.display = "block";
          return;
        }

        saveBtn.disabled    = true;
        saveBtn.textContent = "Saving…";

        try {
          await invoke("save_config", { apiKey, serverUrl });
          successEl.style.display = "block";
          if (apiKey) {
            // Key was just saved — switch to "saved" placeholder
            keyInput.value       = "";
            keyInput.placeholder = "••••••••  (saved)";
            keyHint.style.display = "block";
          }
        } catch (err) {
          errorEl.textContent   = String(err);
          errorEl.style.display = "block";
        } finally {
          saveBtn.disabled    = false;
          saveBtn.textContent = "Save";
        }
      });

      // ── Run Scrape (Logs tab) ──────────────────────────────────────────────
      const runScrapeBtn = document.getElementById("run-scrape-btn");

      runScrapeBtn.addEventListener("click", async () => {
        runScrapeBtn.disabled     = true;
        runScrapeBtn.textContent  = "Starting…";
        try {
          await fetch(`${SIDECAR}/scrape/now`, { method: "POST" });
        } catch { /* fire-and-forget — sidecar logs the result */ }
        setTimeout(() => {
          runScrapeBtn.disabled    = false;
          runScrapeBtn.textContent = "▶ Run Scrape";
        }, 2000);
      });

      // ── Logs ───────────────────────────────────────────────────────────────
      const logBox   = document.getElementById("log-box");
      const logCount = document.getElementById("log-count");
      const clearBtn = document.getElementById("clear-btn");

      let localLogs  = [];   // displayed entries
      let autoScroll = true; // follow tail unless user scrolled up

      logBox.addEventListener("scroll", () => {
        const atBottom = logBox.scrollHeight - logBox.scrollTop - logBox.clientHeight < 40;
        autoScroll = atBottom;
      });

      function esc(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderLogs() {
        if (localLogs.length === 0) {
          logBox.innerHTML = '<div class="log-empty">No logs yet.</div>';
          logCount.textContent = "0 entries";
          return;
        }
        logBox.innerHTML = localLogs
          .map((e) => {
            // Use local time (respects CET/user timezone) instead of slicing the UTC ISO string
            const ts = new Date(e.ts).toLocaleTimeString(undefined, {
              hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
            });
            return `<div class="log-entry ${e.level}">` +
              `<span class="log-ts">${ts}</span>` +
              `<span class="log-msg">${esc(e.msg)}</span>` +
              `</div>`;
          })
          .join("");
        logCount.textContent = `${localLogs.length} entries`;
        if (autoScroll) logBox.scrollTop = logBox.scrollHeight;
      }

      // Track when logs were last cleared — entries older than this are hidden
      let clearedAt = 0;

      async function pollLogs() {
        try {
          const res = await fetchTimeout(`${SIDECAR}/logs`);
          if (!res.ok) return;
          const data = await res.json();
          const all = data.logs ?? [];
          // Filter out entries that predate the last clear
          localLogs = clearedAt ? all.filter((e) => new Date(e.ts).getTime() >= clearedAt) : all;
          renderLogs();
        } catch { /* sidecar offline — keep existing display */ }
      }

      clearBtn.addEventListener("click", () => {
        clearedAt = Date.now();
        localLogs = [];
        renderLogs();
      });

      pollLogs();
      setInterval(pollLogs, 3000);

      // ── Schedule / next run time ────────────────────────────────────────────
      const scheduleText = document.getElementById("schedule-text");

      async function pollSchedule() {
        try {
          const res = await fetchTimeout(`${SIDECAR}/schedule`);
          if (!res.ok) { scheduleText.textContent = ""; return; }
          const data = await res.json();
          updatePauseBtn(!!data.paused);
          updateRunningState(!!data.running);
          if (data.paused) {
            scheduleText.textContent = "· paused";
          } else if (data.running) {
            scheduleText.textContent = "· Scrape running…";
          } else if (data.nextRunAt) {
            const diffMin = Math.max(0, Math.round((data.nextRunAt - Date.now()) / 60000));
            const nextTime = new Date(data.nextRunAt).toLocaleTimeString(undefined, {
              hour: "2-digit", minute: "2-digit", hour12: false,
            });
            scheduleText.textContent = `· next: ${nextTime} (${diffMin} min)`;
          } else {
            scheduleText.textContent = "";
          }
        } catch {
          scheduleText.textContent = "";
        }
      }

      pollSchedule();
      setInterval(pollSchedule, 10000);

      // ── Pause / Resume scheduler ────────────────────────────────────────────
      const pauseBtn = document.getElementById("pause-btn");
      let schedulerPaused = false;

      function updatePauseBtn(paused) {
        schedulerPaused = paused;
        if (paused) {
          pauseBtn.textContent = "▶ Resume schedule";
          pauseBtn.classList.add("paused");
        } else {
          pauseBtn.textContent = "⏸ Pause schedule";
          pauseBtn.classList.remove("paused");
        }
      }

      pauseBtn.addEventListener("click", async () => {
        pauseBtn.disabled = true;
        try {
          const endpoint = schedulerPaused ? "/scheduler/resume" : "/scheduler/pause";
          await fetch(`${SIDECAR}${endpoint}`, { method: "POST" });
          await pollSchedule();
        } catch { /* ignore */ } finally {
          pauseBtn.disabled = false;
        }
      });

      // ── Stop Scrape ─────────────────────────────────────────────────────────
      const stopScrapeBtn         = document.getElementById("stop-scrape-btn");
      const stopScrapeSettingsBtn = document.getElementById("stop-scrape-settings-btn");

      async function doStopScrape(btn) {
        btn.disabled    = true;
        btn.textContent = "Stopping…";
        try {
          await fetch(`${SIDECAR}/scrape/stop`, { method: "POST" });
        } catch { /* ignore */ }
        setTimeout(() => { btn.textContent = "⏹ Stop" + (btn.id === "stop-scrape-settings-btn" ? " Scrape" : ""); }, 1500);
      }

      stopScrapeBtn.addEventListener("click",         () => doStopScrape(stopScrapeBtn));
      stopScrapeSettingsBtn.addEventListener("click", () => doStopScrape(stopScrapeSettingsBtn));

      // ── Clear browser profile ───────────────────────────────────────────────
      const clearProfileBtn     = document.getElementById("clear-profile-btn");
      const clearProfileError   = document.getElementById("clear-profile-error");
      const clearProfileSuccess = document.getElementById("clear-profile-success");

      // Update all run/stop/clear-profile buttons based on whether a scrape is running
      function updateRunningState(running) {
        document.getElementById("run-scrape-btn").disabled          = running;
        document.getElementById("run-scrape-settings-btn").disabled = running;
        stopScrapeBtn.disabled         = !running;
        stopScrapeSettingsBtn.disabled = !running;
        clearProfileBtn.disabled       = running;
      }

      clearProfileBtn.addEventListener("click", async () => {
        clearProfileError.style.display   = "none";
        clearProfileSuccess.style.display = "none";
        clearProfileBtn.disabled    = true;
        clearProfileBtn.textContent = "Clearing…";
        try {
          const res  = await fetch(`${SIDECAR}/clear-profile`, { method: "POST" });
          const data = await res.json().catch(() => ({}));
          if (res.ok) {
            clearProfileSuccess.style.display = "block";
          } else {
            clearProfileError.textContent   = data.error ?? `Error ${res.status}`;
            clearProfileError.style.display = "block";
          }
        } catch (err) {
          clearProfileError.textContent   = String(err);
          clearProfileError.style.display = "block";
        } finally {
          clearProfileBtn.disabled    = false;
          clearProfileBtn.textContent = "🗑 Clear Browser Profile";
        }
      });

      // ── Update badge ────────────────────────────────────────────────────────
      const updateBadge   = document.getElementById("update-badge");
      const updateVersion = document.getElementById("update-version");
      let availableTag    = null;

      async function pollUpdateVersion() {
        try {
          const tag = await invoke("get_update_version");
          availableTag = tag ?? null;
          if (availableTag) {
            updateVersion.textContent = availableTag;
            updateBadge.style.display = "flex";
          } else {
            updateBadge.style.display = "none";
          }
        } catch { /* ignore */ }
      }

      updateBadge.addEventListener("click", async () => {
        if (!availableTag) return;
        updateBadge.style.opacity = "0.5";
        updateBadge.style.pointerEvents = "none";
        try {
          await invoke("install_update");
        } catch { /* ignore — Rust side handles errors */ } finally {
          // Restore button whether user clicked Yes, No, or dialog was dismissed.
          updateBadge.style.opacity = "";
          updateBadge.style.pointerEvents = "";
        }
      });

      pollUpdateVersion();
      setInterval(pollUpdateVersion, 5 * 60 * 1000); // re-check every 5 min

      // ── Run Scrape (Settings tab) ───────────────────────────────────────────
      const runScrapeSettingsBtn = document.getElementById("run-scrape-settings-btn");

      runScrapeSettingsBtn.addEventListener("click", async () => {
        runScrapeSettingsBtn.disabled    = true;
        runScrapeSettingsBtn.textContent = "Starting…";
        switchTab("logs");
        try {
          await fetch(`${SIDECAR}/scrape/now`, { method: "POST" });
        } catch { /* fire-and-forget */ }
        setTimeout(() => {
          runScrapeSettingsBtn.disabled    = false;
          runScrapeSettingsBtn.textContent = "▶ Run Scrape";
        }, 2000);
      });
    </script>
  </body>
</html>
