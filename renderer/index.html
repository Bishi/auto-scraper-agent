<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto-Scraper Setup</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 420px;
      }

      h1 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      p.subtitle {
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #cbd5e1;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #1e293b;
        color: #f1f5f9;
        font-size: 14px;
        outline: none;
        margin-bottom: 16px;
      }

      input:focus { border-color: #6366f1; }

      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #6366f1;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover { background: #4f46e5; }
      button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

      .error {
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 6px;
        background: #450a0a;
        color: #fca5a5;
        font-size: 13px;
        display: none;
      }

      .success {
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 6px;
        background: #052e16;
        color: #86efac;
        font-size: 13px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Auto-Scraper Agent Setup</h1>
      <p class="subtitle">
        Enter the URL of your Auto-Scraper server and your API key.<br />
        You can find the API key in Settings &rarr; Account.
      </p>

      <label for="server-url">Server URL</label>
      <input
        id="server-url"
        type="url"
        placeholder="https://your-server.vercel.app"
        autocomplete="off"
        spellcheck="false"
      />

      <label for="api-key">API Key</label>
      <input
        id="api-key"
        type="password"
        placeholder="as_live_…"
        autocomplete="off"
        spellcheck="false"
      />

      <button id="save-btn">Save &amp; Start</button>
      <div class="error" id="error-msg"></div>
      <div class="success" id="success-msg">Saved! The agent will start scraping on schedule.</div>
    </div>

    <script>
      const { invoke } = window.__TAURI__.core;

      const serverInput = document.getElementById("server-url");
      const keyInput    = document.getElementById("api-key");
      const saveBtn     = document.getElementById("save-btn");
      const errorEl     = document.getElementById("error-msg");
      const successEl   = document.getElementById("success-msg");

      saveBtn.addEventListener("click", async () => {
        errorEl.style.display   = "none";
        successEl.style.display = "none";

        const serverUrl = serverInput.value.trim();
        const apiKey    = keyInput.value.trim();

        if (!serverUrl || !apiKey) {
          errorEl.textContent    = "Both fields are required.";
          errorEl.style.display  = "block";
          return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = "Saving…";

        try {
          await invoke("save_config", { apiKey, serverUrl });
          successEl.style.display = "block";
        } catch (err) {
          errorEl.textContent   = String(err);
          errorEl.style.display = "block";
        } finally {
          saveBtn.disabled    = false;
          saveBtn.textContent = "Save & Start";
        }
      });
    </script>
  </body>
</html>
